<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Pin Game - GeoGuessr Edition</title>
    <!-- Chargement de Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gameUI">
        <!-- Barre de statistiques -->
        <div id="topBar">
            <div>Round : <span id="roundInfo">1 / 10</span></div>
            <div>Score : <span id="score">0</span></div>
            <div>Time : <span id="timer">60s</span></div>
        </div>

        <!-- Zone de la Photo -->
        <div id="imageContainer">
            <img id="locationPhoto" src="" alt="Où est-ce ?">
        </div>

        <!-- Zone de la Carte -->
        <div id="map"></div>

        <!-- Barre de contrôle (Valider / Suivant) -->
        <div id="bottomBar">
            <button id="validateButton" disabled>Validate</button>
            <button id="nextRoundButton" class="hidden">Next round</button>
        </div>

        <!-- Fenêtre de résultats flottante -->
        <div id="resultBox" class="hidden"></div>
    </div>

    <!-- Scripts : Leaflet d'abord, puis ton script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
