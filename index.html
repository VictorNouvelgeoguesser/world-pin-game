<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Pin Game</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

  <div id="gameUI">
    <div id="topBar">
      <div>
        <strong>Round :</strong>
        <span id="roundInfo"></span>
      </div>
      <div>
        <strong>Score :</strong>
        <span id="score"></span>
      </div>
      <div>
        <strong>Temps :</strong>
        <span id="timer"></span>
      </div>
    </div>

    <div id="map"></div>

    <div id="bottomBar">
      <button id="validateButton" disabled>Valider</button>
      <button id="nextRoundButton" class="hidden">Round suivant</button>
    </div>

    <div id="resultBox" class="hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
